name: Mirror to GitLab
on:
  push:
    branches: ["**"]
  delete: {}
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push mirror to GitLab
        env:
          GL_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          git lfs fetch --all
          git push --prune "https://oauth2:${GL_TOKEN}@gitlab.com/hwillGIT/OPALproject.git" "+refs/remotes/origin/*:refs/heads/*" "+refs/tags/*:refs/tags/*"
          git lfs push --all "https://oauth2:${GL_TOKEN}@gitlab.com/hwillGIT/OPALproject.git"
